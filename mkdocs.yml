site_name: "VamsiLabs Dev Notes"
site_description: "FAANG-level Java, Spring Boot & System Design interview prep — 100+ deep-dive topics with Mermaid diagrams, production code examples, and interview questions."
site_author: "Vamsi Karuturi"
site_url: "https://vamsilabs.netlify.app"

# repo_name: "vamsi1998123/vamsilabs-dev-notes-main"
# repo_url: "https://github.com/vamsi1998123/vamsilabs-dev-notes-main"

copyright: "&copy; 2024 - 2026 Vamsi Karuturi"

theme:
  name: material
  custom_dir: docs/custom
  language: en
  font: false
  icon:
    repo: fontawesome/brands/github
    logo: material/code-braces-box
  favicon: material/code-braces-box
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
      primary: custom
      accent: custom
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
      primary: custom
      accent: custom
  features:
    - announce.dismiss
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
    - navigation.tabs
    - navigation.tabs.sticky
    # navigation.sections removed — sections are now collapsible
    - navigation.tracking
    - navigation.instant
    - navigation.instant.progress
    - navigation.top
    - navigation.indexes
    - navigation.footer
    - navigation.path
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

extra_css:
  - custom/custom.css

extra_javascript:
  - custom/theme-toggle.js
  - custom/auth.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: false
      permalink_title: "Link to this section"
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      auto_title: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

hooks:
  - hooks/mermaid_compact.py
  - hooks/seo_structured_data.py

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - termynal:
      title: bash
      buttons: windows
  - minify:
      minify_html: true
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
      enabled: !ENV [ENABLE_GIT_DATES, true]

