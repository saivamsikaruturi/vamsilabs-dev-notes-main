[build]
command = "mkdocs build --config-file mkdocs.yml"
publish = "site"

[build.environment]
PYTHON_VERSION = "3.12"

[[headers]]
for = "/robots.txt"
[headers.values]
Content-Type = "text/plain"
Cache-Control = "public, max-age=86400"

[[headers]]
for = "/sitemap.xml"
[headers.values]
Content-Type = "application/xml"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/sitemap.xml.gz"
[headers.values]
Content-Type = "application/gzip"
Cache-Control = "public, max-age=3600"

[[headers]]
for = "/*"
[headers.values]
X-Robots-Tag = "index, follow"
X-Content-Type-Options = "nosniff"
X-Frame-Options = "SAMEORIGIN"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/assets/*"
[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/custom/*.css"
[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/custom/*.js"
[headers.values]
Cache-Control = "public, max-age=604800"

[[headers]]
for = "/search/*"
[headers.values]
Cache-Control = "public, max-age=86400"

[[redirects]]
from = "/sitemap"
to = "/sitemap.xml"
status = 301

[[redirects]]
from = "/java"
to = "/java/java-interview-guide/"
status = 301

[[redirects]]
from = "/spring-boot"
to = "/springboot/spring-boot-interview-guide/"
