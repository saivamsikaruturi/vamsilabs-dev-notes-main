<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" font-family="DM Sans, sans-serif">
  <rect width="380" height="220" fill="#FAFAF9" rx="10"/>
  <text x="190" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1C1917" font-family="Space Grotesk, sans-serif">TLS 1.3 Handshake (1 Round Trip)</text>
  <!-- Client -->
  <rect x="25" y="32" width="65" height="24" fill="#DBEAFE" rx="5" stroke="#60A5FA"/><text x="57" y="48" text-anchor="middle" font-size="9" font-weight="600" fill="#1D4ED8">Client</text>
  <!-- Server -->
  <rect x="290" y="32" width="65" height="24" fill="#D1FAE5" rx="5" stroke="#34D399"/><text x="322" y="48" text-anchor="middle" font-size="9" font-weight="600" fill="#059669">Server</text>
  <!-- Lines -->
  <line x1="57" y1="58" x2="57" y2="195" stroke="#93C5FD" stroke-width="1.5"/>
  <line x1="322" y1="58" x2="322" y2="195" stroke="#86EFAC" stroke-width="1.5"/>
  <!-- Step 1 -->
  <line x1="60" y1="75" x2="319" y2="88" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#t1)"/>
  <rect x="90" y="68" width="200" height="15" fill="#EFF6FF" rx="3"/><text x="190" y="79" text-anchor="middle" font-size="7" fill="#1D4ED8">① Client Hello + ciphers + key share</text>
  <!-- Step 2 -->
  <line x1="319" y1="105" x2="60" y2="118" stroke="#10B981" stroke-width="1.5" marker-end="url(#t2)"/>
  <rect x="80" y="98" width="220" height="15" fill="#F0FDF4" rx="3"/><text x="190" y="109" text-anchor="middle" font-size="7" fill="#059669">② Server Hello + cert + key share + encrypted ext</text>
  <!-- Step 3 -->
  <rect x="20" y="128" width="90" height="14" fill="#FEF3C7" rx="3"/><text x="65" y="138" text-anchor="middle" font-size="7" fill="#92400E">③ Verify + derive key</text>
  <!-- Step 4 -->
  <line x1="60" y1="155" x2="319" y2="162" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#t1)"/>
  <rect x="110" y="148" width="160" height="15" fill="#EFF6FF" rx="3"/><text x="190" y="159" text-anchor="middle" font-size="7" fill="#1D4ED8">④ Finished + encrypted data</text>
  <!-- Encrypted -->
  <rect x="40" y="178" width="300" height="18" fill="#D1FAE5" rx="4" stroke="#86EFAC" stroke-dasharray="3,2"/>
  <text x="190" y="190" text-anchor="middle" font-size="8" fill="#065F46">🔒 AES-256 symmetric encryption begins</text>
  <text x="190" y="212" text-anchor="middle" font-size="7" fill="#78716C">Total: 1-RTT (~50ms). TLS 1.2 took 2-RTT.</text>
  <defs>
    <marker id="t1" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0,5 2,0 4" fill="#3B82F6"/></marker>
    <marker id="t2" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0,5 2,0 4" fill="#10B981"/></marker>
  </defs>
</svg>