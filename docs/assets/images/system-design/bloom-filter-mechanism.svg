<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200">
  <defs>
    <linearGradient id="bloomBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="456" height="196" rx="10" fill="url(#bloomBg)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="230" y="22" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="11" font-weight="700" fill="#1e293b">Bloom Filter — Insert &amp; Query</text>
  <!-- Bit Array -->
  <text x="230" y="45" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#475569">Bit Array (m = 16)</text>
  <!-- Bit cells -->
  <rect x="55" y="52" width="22" height="22" rx="3" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="66" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#94a3b8">0</text>
  <rect x="80" y="52" width="22" height="22" rx="3" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
  <text x="91" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="white">1</text>
  <rect x="105" y="52" width="22" height="22" rx="3" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="116" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#94a3b8">0</text>
  <rect x="130" y="52" width="22" height="22" rx="3" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
  <text x="141" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="white">1</text>
  <rect x="155" y="52" width="22" height="22" rx="3" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="166" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#94a3b8">0</text>
  <rect x="180" y="52" width="22" height="22" rx="3" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="191" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#94a3b8">0</text>
  <rect x="205" y="52" width="22" height="22" rx="3" fill="#10b981" stroke="#059669" stroke-width="1"/>
  <text x="216" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="white">1</text>
  <rect x="230" y="52" width="22" height="22" rx="3" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="241" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#94a3b8">0</text>
  <rect x="255" y="52" width="22" height="22" rx="3" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="266" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#94a3b8">0</text>
  <rect x="280" y="52" width="22" height="22" rx="3" fill="#3b82f6" stroke="#2563eb" stroke-width="1"/>
  <text x="291" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="white">1</text>
  <rect x="305" y="52" width="22" height="22" rx="3" fill="#10b981" stroke="#059669" stroke-width="1"/>
  <text x="316" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="white">1</text>
  <rect x="330" y="52" width="22" height="22" rx="3" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="341" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#94a3b8">0</text>
  <rect x="355" y="52" width="22" height="22" rx="3" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="366" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="#94a3b8">0</text>
  <rect x="380" y="52" width="22" height="22" rx="3" fill="#10b981" stroke="#059669" stroke-width="1"/>
  <text x="391" y="67" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" fill="white">1</text>
  <!-- Insert example -->
  <rect x="20" y="95" width="200" height="45" rx="6" fill="white" stroke="#3b82f6" stroke-width="1"/>
  <text x="120" y="110" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#1e40af">INSERT "apple"</text>
  <text x="120" y="123" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#475569">h1("apple")=1, h2("apple")=3, h3("apple")=9</text>
  <text x="120" y="134" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#3b82f6">Set bits 1, 3, 9 → 1</text>
  <!-- Query example -->
  <rect x="240" y="95" width="200" height="45" rx="6" fill="white" stroke="#10b981" stroke-width="1"/>
  <text x="340" y="110" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#065f46">QUERY "grape"</text>
  <text x="340" y="123" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#475569">h1("grape")=6, h2("grape")=10, h3("grape")=13</text>
  <text x="340" y="134" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#10b981">Check bits: 1,1,1 → "Maybe yes"</text>
  <!-- Result boxes -->
  <rect x="20" y="155" width="200" height="35" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
  <text x="120" y="170" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#166534">"Definitely NOT in set"</text>
  <text x="120" y="182" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#166534">If ANY bit is 0 → 100% certain absent</text>
  <rect x="240" y="155" width="200" height="35" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1"/>
  <text x="340" y="170" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#92400e">"POSSIBLY in set"</text>
  <text x="340" y="182" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#92400e">All bits 1 → might be false positive (~1%)</text>
</svg>
