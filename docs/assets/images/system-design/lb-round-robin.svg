<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" font-family="DM Sans, sans-serif">
  <rect width="400" height="160" fill="#FAFAF9" rx="10"/>
  <text x="200" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1C1917" font-family="Space Grotesk, sans-serif">Round Robin — Cycle 1→2→3→1...</text>
  <!-- Requests -->
  <rect x="10" y="35" width="50" height="20" fill="#FEF3C7" rx="4" stroke="#F59E0B"/><text x="35" y="49" text-anchor="middle" font-size="7" fill="#92400E">Req 1</text>
  <rect x="10" y="60" width="50" height="20" fill="#FEF3C7" rx="4" stroke="#F59E0B"/><text x="35" y="74" text-anchor="middle" font-size="7" fill="#92400E">Req 2</text>
  <rect x="10" y="85" width="50" height="20" fill="#FEF3C7" rx="4" stroke="#F59E0B"/><text x="35" y="99" text-anchor="middle" font-size="7" fill="#92400E">Req 3</text>
  <rect x="10" y="110" width="50" height="20" fill="#FEF3C7" rx="4" stroke="#F59E0B"/><text x="35" y="124" text-anchor="middle" font-size="7" fill="#92400E">Req 4</text>
  <!-- LB -->
  <rect x="110" y="55" width="75" height="40" fill="#3B82F6" rx="7"/><text x="147" y="78" text-anchor="middle" font-size="9" font-weight="600" fill="white">Round Robin</text>
  <!-- Arrows in -->
  <line x1="62" y1="45" x2="108" y2="70" stroke="#78716C" stroke-width="0.8"/><line x1="62" y1="70" x2="108" y2="73" stroke="#78716C" stroke-width="0.8"/>
  <line x1="62" y1="95" x2="108" y2="77" stroke="#78716C" stroke-width="0.8"/><line x1="62" y1="120" x2="108" y2="80" stroke="#78716C" stroke-width="0.8"/>
  <!-- Servers -->
  <rect x="245" y="30" width="70" height="25" fill="#DBEAFE" rx="5" stroke="#60A5FA"/><text x="280" y="46" text-anchor="middle" font-size="8" fill="#1D4ED8">Server 1</text>
  <rect x="245" y="63" width="70" height="25" fill="#DBEAFE" rx="5" stroke="#60A5FA"/><text x="280" y="79" text-anchor="middle" font-size="8" fill="#1D4ED8">Server 2</text>
  <rect x="245" y="96" width="70" height="25" fill="#DBEAFE" rx="5" stroke="#60A5FA"/><text x="280" y="112" text-anchor="middle" font-size="8" fill="#1D4ED8">Server 3</text>
  <!-- Arrows out -->
  <line x1="187" y1="68" x2="243" y2="43" stroke="#10B981" stroke-width="1.2" marker-end="url(#a1)"/>
  <line x1="187" y1="75" x2="243" y2="75" stroke="#10B981" stroke-width="1.2" marker-end="url(#a1)"/>
  <line x1="187" y1="82" x2="243" y2="108" stroke="#10B981" stroke-width="1.2" marker-end="url(#a1)"/>
  <!-- Labels -->
  <text x="330" y="44" font-size="7" fill="#059669">← R1, R4</text>
  <text x="330" y="77" font-size="7" fill="#059669">← R2</text>
  <text x="330" y="110" font-size="7" fill="#059669">← R3</text>
  <text x="200" y="150" text-anchor="middle" font-size="8" fill="#991B1B">⚠️ Ignores server load</text>
  <defs><marker id="a1" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0,5 2,0 4" fill="#10B981"/></marker></defs>
</svg>