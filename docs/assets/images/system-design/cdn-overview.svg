<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 200">
  <defs>
    <linearGradient id="cdnBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="456" height="196" rx="10" fill="url(#cdnBg)" stroke="#e2e8f0" stroke-width="1"/>
  <!-- User -->
  <circle cx="50" cy="60" r="18" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="50" y="57" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14">👤</text>
  <text x="50" y="73" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="6" fill="#3b82f6">Tokyo</text>
  <!-- DNS -->
  <rect x="100" y="30" width="60" height="26" rx="5" fill="#f59e0b" stroke="#d97706" stroke-width="1"/>
  <text x="130" y="47" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="white">DNS</text>
  <text x="130" y="72" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#64748b">Routes to nearest</text>
  <!-- Edge Tokyo -->
  <rect x="190" y="25" width="80" height="40" rx="6" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
  <text x="230" y="42" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="white">Edge: Tokyo</text>
  <text x="230" y="55" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#d1fae5">Cache HIT → 5ms</text>
  <!-- Edge NYC -->
  <rect x="190" y="80" width="80" height="30" rx="6" fill="#6ee7b7" stroke="#059669" stroke-width="1"/>
  <text x="230" y="99" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#065f46">Edge: NYC</text>
  <!-- Edge London -->
  <rect x="190" y="120" width="80" height="30" rx="6" fill="#6ee7b7" stroke="#059669" stroke-width="1"/>
  <text x="230" y="139" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#065f46">Edge: London</text>
  <!-- Origin -->
  <rect x="340" y="60" width="90" height="50" rx="8" fill="#475569" stroke="#334155" stroke-width="1.5"/>
  <text x="385" y="82" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="white">Origin Server</text>
  <text x="385" y="98" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#cbd5e1">Virginia, US</text>
  <!-- Arrows -->
  <path d="M68 55 L100 45" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrowCdn)"/>
  <path d="M160 43 L190 43" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrowCdn)"/>
  <!-- Cache miss line -->
  <path d="M270 50 L340 70" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arrowCdn)"/>
  <text x="310" y="50" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#ef4444">MISS → fetch</text>
  <!-- Labels -->
  <text x="230" y="170" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="9" font-weight="600" fill="#475569">200+ Edge Locations Worldwide</text>
  <text x="230" y="185" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#64748b">95% of requests served from edge (never hit origin)</text>
  <defs>
    <marker id="arrowCdn" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
