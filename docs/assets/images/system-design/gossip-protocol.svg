<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200">
  <defs>
    <linearGradient id="gossipBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="416" height="196" rx="10" fill="url(#gossipBg)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="210" y="20" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#1e293b">Gossip — Exponential Spread</text>
  <!-- Round 1 -->
  <text x="70" y="40" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#475569">Round 1</text>
  <circle cx="70" cy="65" r="12" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="70" y="69" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="white">A</text>
  <circle cx="70" cy="100" r="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="70" y="104" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#475569">B</text>
  <circle cx="40" cy="130" r="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="40" y="134" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#475569">C</text>
  <circle cx="100" cy="130" r="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="100" y="134" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#475569">D</text>
  <path d="M70 77 L70 88" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowGossip)"/>
  <text x="70" y="155" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#3b82f6">A tells B</text>
  <!-- Round 2 -->
  <text x="210" y="40" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#475569">Round 2</text>
  <circle cx="210" cy="65" r="12" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="210" y="69" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="white">A</text>
  <circle cx="210" cy="100" r="12" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="210" y="104" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="white">B</text>
  <circle cx="180" cy="130" r="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="180" y="134" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#475569">C</text>
  <circle cx="240" cy="130" r="12" fill="#e2e8f0" stroke="#94a3b8" stroke-width="1"/>
  <text x="240" y="134" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#475569">D</text>
  <path d="M203 108 L187 122" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowGossip)"/>
  <path d="M217 108 L233 122" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowGossip)"/>
  <text x="210" y="155" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#3b82f6">A→C, B→D</text>
  <!-- Round 3 -->
  <text x="350" y="40" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#475569">Round 3</text>
  <circle cx="350" cy="65" r="12" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="350" y="69" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="white">A</text>
  <circle cx="350" cy="100" r="12" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="350" y="104" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="white">B</text>
  <circle cx="320" cy="130" r="12" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="320" y="134" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="white">C</text>
  <circle cx="380" cy="130" r="12" fill="#3b82f6" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="380" y="134" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="white">D</text>
  <text x="350" y="155" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#3b82f6">All informed!</text>
  <!-- Summary -->
  <rect x="80" y="168" width="260" height="22" rx="5" fill="#dbeafe" stroke="#60a5fa" stroke-width="1"/>
  <text x="210" y="183" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#1e40af">O(log N) rounds → all N nodes converge</text>
  <defs>
    <marker id="arrowGossip" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>
