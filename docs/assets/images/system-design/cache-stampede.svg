<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 170" font-family="DM Sans, sans-serif">
  <rect width="440" height="170" fill="#FAFAF9" rx="10"/>
  <text x="220" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1C1917" font-family="Space Grotesk, sans-serif">Cache Stampede (Thundering Herd)</text>
  <!-- Problem side -->
  <rect x="8" y="28" width="210" height="130" fill="#FEF2F2" rx="7" stroke="#FECACA"/>
  <text x="113" y="43" text-anchor="middle" font-size="8" font-weight="700" fill="#DC2626">❌ The Problem</text>
  <!-- Popular key expires -->
  <rect x="20" y="50" width="75" height="20" fill="#FEE2E2" rx="4"/><text x="57" y="63" text-anchor="middle" font-size="7" fill="#DC2626">Key expires!</text>
  <!-- Many threads -->
  <rect x="20" y="78" width="30" height="14" fill="#FEF3C7" rx="2"/><text x="35" y="88" text-anchor="middle" font-size="5" fill="#92400E">T1</text>
  <rect x="54" y="78" width="30" height="14" fill="#FEF3C7" rx="2"/><text x="69" y="88" text-anchor="middle" font-size="5" fill="#92400E">T2</text>
  <rect x="88" y="78" width="30" height="14" fill="#FEF3C7" rx="2"/><text x="103" y="88" text-anchor="middle" font-size="5" fill="#92400E">T3</text>
  <rect x="122" y="78" width="30" height="14" fill="#FEF3C7" rx="2"/><text x="137" y="88" text-anchor="middle" font-size="5" fill="#92400E">...</text>
  <text x="85" y="105" text-anchor="middle" font-size="6" fill="#DC2626">1000 threads ALL miss</text>
  <!-- DB crushed -->
  <rect x="40" y="112" width="100" height="22" fill="#EF4444" rx="4"/><text x="90" y="124" text-anchor="middle" font-size="7" font-weight="600" fill="white">💀 DB crushed</text>
  <text x="90" y="140" text-anchor="middle" font-size="6" fill="#7F1D1D">1000 identical queries</text>
  <!-- Arrow -->
  <line x1="30" y1="92" x2="50" y2="112" stroke="#DC2626" stroke-width="0.8"/><line x1="60" y1="92" x2="70" y2="112" stroke="#DC2626" stroke-width="0.8"/>
  <line x1="90" y1="92" x2="85" y2="112" stroke="#DC2626" stroke-width="0.8"/><line x1="120" y1="92" x2="100" y2="112" stroke="#DC2626" stroke-width="0.8"/>
  <!-- Solution side -->
  <rect x="228" y="28" width="200" height="130" fill="#F0FDF4" rx="7" stroke="#BBF7D0"/>
  <text x="328" y="43" text-anchor="middle" font-size="8" font-weight="700" fill="#059669">✅ Solutions</text>
  <!-- Solution 1 -->
  <rect x="238" y="52" width="180" height="28" fill="white" rx="4" stroke="#86EFAC"/>
  <text x="248" y="64" font-size="7" font-weight="600" fill="#059669">🔒 Mutex/Lock</text>
  <text x="248" y="74" font-size="6" fill="#44403C">Only 1 thread fetches, rest wait</text>
  <!-- Solution 2 -->
  <rect x="238" y="85" width="180" height="28" fill="white" rx="4" stroke="#86EFAC"/>
  <text x="248" y="97" font-size="7" font-weight="600" fill="#059669">⏰ Stale-while-revalidate</text>
  <text x="248" y="107" font-size="6" fill="#44403C">Serve stale, refresh in background</text>
  <!-- Solution 3 -->
  <rect x="238" y="118" width="180" height="28" fill="white" rx="4" stroke="#86EFAC"/>
  <text x="248" y="130" font-size="7" font-weight="600" fill="#059669">🎲 Random TTL jitter</text>
  <text x="248" y="140" font-size="6" fill="#44403C">Keys don't all expire together</text>
</svg>