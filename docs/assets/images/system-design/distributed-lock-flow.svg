<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 180" font-family="DM Sans, sans-serif">
  <rect width="440" height="180" fill="#FAFAF9" rx="10"/>
  <text x="220" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1C1917" font-family="Space Grotesk, sans-serif">Double-Booking Problem → Lock Solution</text>
  <!-- WITHOUT -->
  <rect x="8" y="32" width="205" height="138" fill="#FEF2F2" rx="8" stroke="#FECACA"/>
  <text x="110" y="48" text-anchor="middle" font-size="9" font-weight="700" fill="#DC2626">❌ Without Lock</text>
  <rect x="18" y="55" width="60" height="22" fill="white" rx="4" stroke="#F87171"/><text x="48" y="69" text-anchor="middle" font-size="7" fill="#1C1917">Server A</text>
  <rect x="18" y="95" width="60" height="22" fill="white" rx="4" stroke="#F87171"/><text x="48" y="109" text-anchor="middle" font-size="7" fill="#1C1917">Server B</text>
  <rect x="120" y="68" width="75" height="30" fill="#FEE2E2" rx="5" stroke="#EF4444"/><text x="157" y="82" text-anchor="middle" font-size="7" font-weight="600" fill="#DC2626">Seat 14A</text><text x="157" y="93" text-anchor="middle" font-size="6" fill="#991B1B">available=true</text>
  <line x1="80" y1="66" x2="118" y2="78" stroke="#EF4444" stroke-width="1"/><line x1="80" y1="106" x2="118" y2="88" stroke="#EF4444" stroke-width="1"/>
  <text x="95" y="60" font-size="6" fill="#DC2626">read ✓</text><text x="95" y="118" font-size="6" fill="#DC2626">read ✓</text>
  <text x="110" y="140" text-anchor="middle" font-size="7" fill="#DC2626" font-weight="600">Both book! 47 people 💀</text>
  <!-- WITH -->
  <rect x="225" y="32" width="205" height="138" fill="#F0FDF4" rx="8" stroke="#BBF7D0"/>
  <text x="327" y="48" text-anchor="middle" font-size="9" font-weight="700" fill="#059669">✅ With Lock</text>
  <rect x="235" y="55" width="60" height="22" fill="white" rx="4" stroke="#34D399"/><text x="265" y="69" text-anchor="middle" font-size="7" fill="#1C1917">Server A</text>
  <rect x="320" y="55" width="35" height="22" fill="#10B981" rx="4"/><text x="337" y="69" text-anchor="middle" font-size="10" fill="white">🔒</text>
  <line x1="297" y1="66" x2="318" y2="66" stroke="#10B981" stroke-width="1.2"/>
  <text x="308" y="55" font-size="6" fill="#059669">gets lock</text>
  <rect x="320" y="85" width="75" height="24" fill="#D1FAE5" rx="4" stroke="#34D399"/><text x="357" y="98" text-anchor="middle" font-size="7" fill="#065F46">Seat booked ✓</text>
  <rect x="235" y="115" width="60" height="22" fill="white" rx="4" stroke="#D6D3D1"/><text x="265" y="129" text-anchor="middle" font-size="7" fill="#78716C">Server B</text>
  <text x="310" y="129" font-size="7" fill="#DC2626">⏳ waits</text>
  <text x="327" y="155" text-anchor="middle" font-size="7" fill="#059669" font-weight="600">1 person, 1 seat ✓</text>
</svg>