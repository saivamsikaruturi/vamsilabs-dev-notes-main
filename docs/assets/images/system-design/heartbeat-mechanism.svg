<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 170">
  <defs>
    <linearGradient id="hbBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect x="2" y="2" width="436" height="166" rx="10" fill="url(#hbBg)" stroke="#e2e8f0" stroke-width="1"/>
  <text x="220" y="20" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="10" font-weight="700" fill="#1e293b">Heartbeat Failure Detection</text>
  <!-- Timeline -->
  <line x1="30" y1="60" x2="410" y2="60" stroke="#cbd5e1" stroke-width="1.5"/>
  <!-- Heartbeats -->
  <circle cx="60" cy="60" r="6" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
  <text x="60" y="50" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#059669">♥</text>
  <circle cx="110" cy="60" r="6" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
  <text x="110" y="50" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#059669">♥</text>
  <circle cx="160" cy="60" r="6" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
  <text x="160" y="50" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#059669">♥</text>
  <circle cx="210" cy="60" r="6" fill="#10b981" stroke="#059669" stroke-width="1.5"/>
  <text x="210" y="50" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#059669">♥</text>
  <!-- Gap - failure -->
  <circle cx="260" cy="60" r="6" fill="white" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="2,1"/>
  <text x="260" y="64" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#ef4444">✗</text>
  <circle cx="310" cy="60" r="6" fill="white" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="2,1"/>
  <text x="310" y="64" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#ef4444">✗</text>
  <circle cx="360" cy="60" r="6" fill="white" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="2,1"/>
  <text x="360" y="64" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#ef4444">✗</text>
  <!-- Labels -->
  <text x="135" y="82" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#059669">Normal (every 2s)</text>
  <text x="310" y="82" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#ef4444">No heartbeat received</text>
  <!-- Timeout marker -->
  <line x1="240" y1="55" x2="240" y2="65" stroke="#f59e0b" stroke-width="2"/>
  <text x="240" y="98" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#f59e0b">Suspect (T=6s)</text>
  <line x1="380" y1="55" x2="380" y2="65" stroke="#ef4444" stroke-width="2"/>
  <text x="380" y="98" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="7" fill="#ef4444">Dead (T=10s)</text>
  <!-- States -->
  <rect x="30" y="110" width="100" height="25" rx="5" fill="#d1fae5" stroke="#10b981" stroke-width="1"/>
  <text x="80" y="126" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#065f46">ALIVE</text>
  <rect x="170" y="110" width="100" height="25" rx="5" fill="#fef3c7" stroke="#f59e0b" stroke-width="1"/>
  <text x="220" y="126" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#92400e">SUSPECT</text>
  <rect x="310" y="110" width="100" height="25" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1"/>
  <text x="360" y="126" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" font-weight="600" fill="#dc2626">DEAD</text>
  <!-- Arrows between states -->
  <path d="M130 122 L170 122" stroke="#64748b" stroke-width="1" marker-end="url(#arrowHb)"/>
  <path d="M270 122 L310 122" stroke="#64748b" stroke-width="1" marker-end="url(#arrowHb)"/>
  <text x="220" y="155" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="8" fill="#64748b">Multiple confirmations required before declaring dead</text>
  <defs>
    <marker id="arrowHb" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#64748b"/>
    </marker>
  </defs>
</svg>
