<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" font-family="DM Sans, sans-serif">
  <rect width="400" height="160" fill="#FAFAF9" rx="10"/>
  <text x="200" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1C1917" font-family="Space Grotesk, sans-serif">Weighted — More Traffic to Bigger Servers</text>
  <!-- LB -->
  <rect x="15" y="55" width="70" height="35" fill="#3B82F6" rx="7"/><text x="50" y="76" text-anchor="middle" font-size="9" font-weight="600" fill="white">Weighted LB</text>
  <!-- Servers -->
  <rect x="150" y="25" width="100" height="30" fill="#DBEAFE" rx="5" stroke="#60A5FA"/>
  <text x="200" y="40" text-anchor="middle" font-size="8" fill="#1D4ED8">S1 (4 CPU) w:1</text>
  <rect x="150" y="62" width="100" height="30" fill="#D1FAE5" rx="5" stroke="#34D399" stroke-width="2"/>
  <text x="200" y="77" text-anchor="middle" font-size="8" fill="#059669" font-weight="600">S2 (32 CPU) w:4</text>
  <rect x="150" y="99" width="100" height="30" fill="#FEF3C7" rx="5" stroke="#F59E0B"/>
  <text x="200" y="114" text-anchor="middle" font-size="8" fill="#92400E">S3 (16 CPU) w:2</text>
  <!-- Arrows (thickness = weight) -->
  <line x1="87" y1="65" x2="148" y2="40" stroke="#60A5FA" stroke-width="1"/>
  <line x1="87" y1="72" x2="148" y2="77" stroke="#34D399" stroke-width="3"/>
  <line x1="87" y1="80" x2="148" y2="114" stroke="#F59E0B" stroke-width="2"/>
  <!-- Traffic bars -->
  <rect x="270" y="32" width="14" height="10" fill="#60A5FA" rx="2"/><text x="290" y="41" font-size="7" fill="#44403C">14%</text>
  <rect x="270" y="69" width="55" height="10" fill="#34D399" rx="2"/><text x="330" y="78" font-size="7" fill="#44403C">57%</text>
  <rect x="270" y="106" width="30" height="10" fill="#F59E0B" rx="2"/><text x="305" y="115" font-size="7" fill="#44403C">29%</text>
  <text x="200" y="148" text-anchor="middle" font-size="8" fill="#78716C">Bigger server gets proportionally more traffic</text>
</svg>