<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" font-family="DM Sans, sans-serif">
  <rect width="400" height="160" fill="#FAFAF9" rx="10"/>
  <text x="200" y="20" text-anchor="middle" font-size="11" font-weight="700" fill="#1C1917" font-family="Space Grotesk, sans-serif">IP Hash — Same Client → Same Server</text>
  <!-- Clients -->
  <rect x="10" y="35" width="75" height="22" fill="#DBEAFE" rx="4" stroke="#60A5FA"/><text x="47" y="49" text-anchor="middle" font-size="7" fill="#1D4ED8">192.168.1.10</text>
  <rect x="10" y="65" width="75" height="22" fill="#D1FAE5" rx="4" stroke="#34D399"/><text x="47" y="79" text-anchor="middle" font-size="7" fill="#059669">192.168.1.42</text>
  <rect x="10" y="95" width="75" height="22" fill="#DBEAFE" rx="4" stroke="#60A5FA"/><text x="47" y="109" text-anchor="middle" font-size="7" fill="#1D4ED8">192.168.1.10</text>
  <text x="47" y="125" text-anchor="middle" font-size="6" fill="#78716C">(same again)</text>
  <!-- Hash -->
  <rect x="120" y="52" width="65" height="35" fill="#8B5CF6" rx="6"/><text x="152" y="72" text-anchor="middle" font-size="9" font-weight="600" fill="white">hash(IP)</text>
  <line x1="87" y1="46" x2="118" y2="65" stroke="#78716C" stroke-width="0.8"/><line x1="87" y1="76" x2="118" y2="70" stroke="#78716C" stroke-width="0.8"/><line x1="87" y1="106" x2="118" y2="75" stroke="#78716C" stroke-width="0.8"/>
  <!-- Servers -->
  <rect x="250" y="30" width="70" height="25" fill="#DBEAFE" rx="5" stroke="#60A5FA" stroke-width="1.5"/><text x="285" y="46" text-anchor="middle" font-size="8" fill="#1D4ED8">Server 1</text>
  <rect x="250" y="62" width="70" height="25" fill="#D1FAE5" rx="5" stroke="#34D399"/><text x="285" y="78" text-anchor="middle" font-size="8" fill="#059669">Server 2</text>
  <rect x="250" y="94" width="70" height="25" fill="#FEF3C7" rx="5" stroke="#F59E0B"/><text x="285" y="110" text-anchor="middle" font-size="8" fill="#92400E">Server 3</text>
  <!-- Arrows -->
  <line x1="187" y1="63" x2="248" y2="42" stroke="#3B82F6" stroke-width="1.5" marker-end="url(#a3)"/>
  <line x1="187" y1="70" x2="248" y2="74" stroke="#10B981" stroke-width="1.5" marker-end="url(#a4)"/>
  <line x1="187" y1="77" x2="248" y2="42" stroke="#3B82F6" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#a3)"/>
  <text x="345" y="44" font-size="7" fill="#1D4ED8" font-weight="600">always!</text>
  <text x="200" y="148" text-anchor="middle" font-size="8" fill="#5B21B6">✓ Session stickiness. ⚠️ Uneven if IPs cluster.</text>
  <defs>
    <marker id="a3" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0,5 2,0 4" fill="#3B82F6"/></marker>
    <marker id="a4" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto"><polygon points="0 0,5 2,0 4" fill="#10B981"/></marker>
  </defs>
</svg>