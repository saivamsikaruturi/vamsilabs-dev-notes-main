<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 160" font-family="DM Sans, sans-serif">
  <rect width="460" height="160" fill="#FAFAF9" rx="10"/>
  <text x="230" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1C1917" font-family="Space Grotesk, sans-serif">Scaling: Vertical (SQL) vs Horizontal (NoSQL)</text>
  <!-- Vertical scaling (left) -->
  <rect x="15" y="28" width="200" height="120" fill="white" rx="8" stroke="#3B82F6" stroke-width="1.2"/>
  <text x="115" y="44" text-anchor="middle" font-size="9" font-weight="700" fill="#1D4ED8">Vertical (Scale Up)</text>
  <!-- Small server growing bigger -->
  <rect x="50" y="55" width="25" height="35" fill="#93C5FD" rx="3" stroke="#60A5FA"/><text x="62" y="76" text-anchor="middle" font-size="7" fill="#1D4ED8">4GB</text>
  <text x="88" y="75" font-size="10" fill="#78716C">→</text>
  <rect x="98" y="50" width="35" height="45" fill="#60A5FA" rx="3" stroke="#3B82F6"/><text x="115" y="76" text-anchor="middle" font-size="7" fill="white">32GB</text>
  <text x="145" y="75" font-size="10" fill="#78716C">→</text>
  <rect x="155" y="45" width="45" height="55" fill="#3B82F6" rx="3" stroke="#1D4ED8"/><text x="177" y="76" text-anchor="middle" font-size="7" fill="white">256GB</text>
  <text x="115" y="115" text-anchor="middle" font-size="7" fill="#44403C">Bigger machine, same count</text>
  <text x="115" y="128" text-anchor="middle" font-size="7" fill="#DC2626">⚠ Has a ceiling ($$$$)</text>
  <text x="115" y="140" text-anchor="middle" font-size="6" fill="#78716C">PostgreSQL, MySQL, Aurora</text>
  <!-- Horizontal scaling (right) -->
  <rect x="240" y="28" width="210" height="120" fill="white" rx="8" stroke="#10B981" stroke-width="1.2"/>
  <text x="345" y="44" text-anchor="middle" font-size="9" font-weight="700" fill="#059669">Horizontal (Scale Out)</text>
  <!-- Multiple small servers -->
  <rect x="260" y="55" width="22" height="30" fill="#86EFAC" rx="3" stroke="#34D399"/><text x="271" y="73" text-anchor="middle" font-size="6" fill="#065F46">N1</text>
  <rect x="287" y="55" width="22" height="30" fill="#86EFAC" rx="3" stroke="#34D399"/><text x="298" y="73" text-anchor="middle" font-size="6" fill="#065F46">N2</text>
  <rect x="314" y="55" width="22" height="30" fill="#86EFAC" rx="3" stroke="#34D399"/><text x="325" y="73" text-anchor="middle" font-size="6" fill="#065F46">N3</text>
  <text x="347" y="73" font-size="10" fill="#78716C">→</text>
  <rect x="358" y="55" width="22" height="30" fill="#86EFAC" rx="3" stroke="#34D399"/><text x="369" y="73" text-anchor="middle" font-size="6" fill="#065F46">N4</text>
  <rect x="385" y="55" width="22" height="30" fill="#86EFAC" rx="3" stroke="#34D399"/><text x="396" y="73" text-anchor="middle" font-size="6" fill="#065F46">N5</text>
  <rect x="412" y="55" width="22" height="30" fill="#34D399" rx="3" stroke="#059669"/><text x="423" y="73" text-anchor="middle" font-size="6" fill="white" font-weight="600">N6</text>
  <text x="345" y="100" text-anchor="middle" font-size="7" fill="#44403C">Add more nodes, same size</text>
  <text x="345" y="113" text-anchor="middle" font-size="7" fill="#059669">✓ Practically unlimited</text>
  <text x="345" y="128" text-anchor="middle" font-size="6" fill="#78716C">DynamoDB, Cassandra, MongoDB</text>
  <text x="345" y="140" text-anchor="middle" font-size="6" fill="#78716C">(Also: Spanner, CockroachDB for SQL)</text>
</svg>