<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 210" font-family="DM Sans, sans-serif">
  <rect width="460" height="210" fill="#FAFAF9" rx="10"/>
  <text x="230" y="18" text-anchor="middle" font-size="11" font-weight="700" fill="#1C1917" font-family="Space Grotesk, sans-serif">NoSQL Database Types</text>
  <!-- Key-Value -->
  <rect x="10" y="30" width="108" height="80" fill="white" rx="7" stroke="#EF4444" stroke-width="1.2"/>
  <rect x="10" y="30" width="108" height="18" fill="#EF4444" rx="7 7 0 0"/><text x="64" y="42" text-anchor="middle" font-size="7" font-weight="700" fill="white">KEY-VALUE</text>
  <text x="64" y="60" text-anchor="middle" font-size="16">🔑</text>
  <text x="64" y="76" text-anchor="middle" font-size="7" fill="#44403C">"key" → "value"</text>
  <text x="64" y="88" text-anchor="middle" font-size="6" fill="#78716C">Redis, DynamoDB</text>
  <text x="64" y="100" text-anchor="middle" font-size="6" fill="#059669">Cache, sessions</text>
  <!-- Document -->
  <rect x="125" y="30" width="108" height="80" fill="white" rx="7" stroke="#F59E0B" stroke-width="1.2"/>
  <rect x="125" y="30" width="108" height="18" fill="#F59E0B" rx="7 7 0 0"/><text x="179" y="42" text-anchor="middle" font-size="7" font-weight="700" fill="white">DOCUMENT</text>
  <text x="179" y="60" text-anchor="middle" font-size="16">📄</text>
  <text x="179" y="76" text-anchor="middle" font-size="7" fill="#44403C">JSON documents</text>
  <text x="179" y="88" text-anchor="middle" font-size="6" fill="#78716C">MongoDB, CouchDB</text>
  <text x="179" y="100" text-anchor="middle" font-size="6" fill="#059669">Catalogs, profiles</text>
  <!-- Wide-Column -->
  <rect x="240" y="30" width="108" height="80" fill="white" rx="7" stroke="#3B82F6" stroke-width="1.2"/>
  <rect x="240" y="30" width="108" height="18" fill="#3B82F6" rx="7 7 0 0"/><text x="294" y="42" text-anchor="middle" font-size="7" font-weight="700" fill="white">WIDE-COLUMN</text>
  <text x="294" y="60" text-anchor="middle" font-size="16">📊</text>
  <text x="294" y="76" text-anchor="middle" font-size="7" fill="#44403C">Row → column families</text>
  <text x="294" y="88" text-anchor="middle" font-size="6" fill="#78716C">Cassandra, HBase</text>
  <text x="294" y="100" text-anchor="middle" font-size="6" fill="#059669">Time-series, IoT</text>
  <!-- Graph -->
  <rect x="355" y="30" width="95" height="80" fill="white" rx="7" stroke="#10B981" stroke-width="1.2"/>
  <rect x="355" y="30" width="95" height="18" fill="#10B981" rx="7 7 0 0"/><text x="402" y="42" text-anchor="middle" font-size="7" font-weight="700" fill="white">GRAPH</text>
  <text x="402" y="60" text-anchor="middle" font-size="16">🕸️</text>
  <text x="402" y="76" text-anchor="middle" font-size="7" fill="#44403C">Nodes + edges</text>
  <text x="402" y="88" text-anchor="middle" font-size="6" fill="#78716C">Neo4j, Neptune</text>
  <text x="402" y="100" text-anchor="middle" font-size="6" fill="#059669">Social, recommend</text>
  <!-- Comparison row -->
  <rect x="10" y="118" width="440" height="82" fill="white" rx="7" stroke="#E7E5E4"/>
  <text x="230" y="133" text-anchor="middle" font-size="9" font-weight="700" fill="#1C1917">SQL vs NoSQL at a Glance</text>
  <!-- SQL side -->
  <rect x="20" y="140" width="200" height="52" fill="#EFF6FF" rx="5"/>
  <text x="120" y="155" text-anchor="middle" font-size="8" font-weight="700" fill="#1D4ED8">SQL (Relational)</text>
  <text x="120" y="167" text-anchor="middle" font-size="7" fill="#44403C">Fixed schema • ACID • Joins</text>
  <text x="120" y="179" text-anchor="middle" font-size="7" fill="#44403C">Vertical scale • Strong consistency</text>
  <text x="120" y="189" text-anchor="middle" font-size="6" fill="#3B82F6">PostgreSQL, MySQL, Spanner</text>
  <!-- NoSQL side -->
  <rect x="235" y="140" width="200" height="52" fill="#FEF3C7" rx="5"/>
  <text x="335" y="155" text-anchor="middle" font-size="8" font-weight="700" fill="#92400E">NoSQL</text>
  <text x="335" y="167" text-anchor="middle" font-size="7" fill="#44403C">Flexible schema • BASE • No joins</text>
  <text x="335" y="179" text-anchor="middle" font-size="7" fill="#44403C">Horizontal scale • Eventual consistency</text>
  <text x="335" y="189" text-anchor="middle" font-size="6" fill="#D97706">DynamoDB, MongoDB, Cassandra</text>
</svg>