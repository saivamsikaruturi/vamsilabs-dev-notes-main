<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Ads Intelligence Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #020408;
            --bg-base: #060a14;
            --bg-card: #0c1220;
            --bg-elevated: #111927;
            --bg-header: #0a1018;
            --border: rgba(59, 130, 246, 0.12);
            --border-hover: rgba(59, 130, 246, 0.3);
            --text-main: #edf2f7;
            --text-muted: #5a6a80;
            --accent-green: #10b981;
            --accent-green-glow: rgba(16, 185, 129, 0.4);
            --accent-red: #ef4444;
            --accent-red-glow: rgba(239, 68, 68, 0.4);
            --accent-blue: #3b82f6;
            --accent-blue-glow: rgba(59, 130, 246, 0.3);
            --accent-cyan: #06b6d4;
            --accent-yellow: #f59e0b;
            --radius: 12px;
            --easing: cubic-bezier(0.16, 1, 0.3, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-deep);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            padding: 28px;
            font-size: 14px;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Ambient Background */
        .ambient-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .ambient-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.06;
            animation: blobFloat 20s ease-in-out infinite;
        }

        .blob-1 {
            width: 600px;
            height: 600px;
            background: var(--accent-blue);
            top: -200px;
            right: -100px;
            animation-delay: 0s;
        }

        .blob-2 {
            width: 400px;
            height: 400px;
            background: var(--accent-cyan);
            bottom: -100px;
            left: -50px;
            animation-delay: -7s;
        }

        .blob-3 {
            width: 300px;
            height: 300px;
            background: #8b5cf6;
            top: 50%;
            left: 60%;
            animation-delay: -14s;
        }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        /* Scanline Overlay */
        .scanline-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.03) 2px,
                rgba(0, 0, 0, 0.03) 4px
            );
        }

        /* Main Content */
        .main-content {
            position: relative;
            z-index: 2;
        }

        /* Header */
        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .terminal-icon {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan));
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px var(--accent-blue-glow);
            animation: iconPulse 3s ease-in-out infinite;
        }

        .terminal-icon svg {
            width: 20px;
            height: 20px;
            fill: white;
        }

        @keyframes iconPulse {
            0%, 100% { box-shadow: 0 0 20px var(--accent-blue-glow); }
            50% { box-shadow: 0 0 30px var(--accent-blue-glow), 0 0 60px rgba(59, 130, 246, 0.1); }
        }

        h1 {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.03em;
            background: linear-gradient(135deg, var(--text-main), var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: livePulse 2s ease-in-out infinite;
        }

        @keyframes livePulse {
            0%, 100% { opacity: 1; box-shadow: 0 0 4px var(--accent-green-glow); }
            50% { opacity: 0.4; box-shadow: none; }
        }

        .controls {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        select, button {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s var(--easing);
            font-family: 'Inter', sans-serif;
        }

        select:hover, button:hover {
            border-color: var(--border-hover);
            box-shadow: 0 0 12px rgba(59, 130, 246, 0.08);
        }

        select:focus, button:focus {
            outline: none;
            border-color: var(--accent-blue);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        button.primary {
            background: linear-gradient(135deg, var(--accent-blue), #2563eb);
            border-color: transparent;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.25);
        }

        button.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
        }

        button.primary:active {
            transform: translateY(0);
        }

        /* KPI Grid */
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 28px;
        }

        .kpi-card {
            background: linear-gradient(145deg, var(--bg-card), var(--bg-elevated));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s var(--easing);
            opacity: 0;
            transform: translateY(12px);
            animation: cardEnter 0.5s var(--easing) forwards;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--accent-blue-glow), transparent);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .kpi-card:hover {
            border-color: var(--border-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 20px rgba(59, 130, 246, 0.05);
        }

        .kpi-card:hover::before {
            opacity: 1;
        }

        @keyframes cardEnter {
            to { opacity: 1; transform: translateY(0); }
        }

        .kpi-label {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .kpi-value {
            font-size: 26px;
            font-weight: 700;
            margin: 10px 0;
            font-family: 'Fira Code', monospace;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .kpi-delta {
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }

        .delta-up {
            color: var(--accent-green);
            text-shadow: 0 0 8px var(--accent-green-glow);
        }

        .delta-down {
            color: var(--accent-red);
            text-shadow: 0 0 8px var(--accent-red-glow);
        }

        .delta-label {
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 4px;
        }

        /* Analytics Row */
        .analytics-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 28px;
        }

        @media (max-width: 1024px) {
            .analytics-row { grid-template-columns: 1fr; }
        }

        .panel {
            background: linear-gradient(145deg, var(--bg-card), var(--bg-elevated));
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            transition: border-color 0.3s ease;
        }

        .panel:hover {
            border-color: var(--border-hover);
        }

        .panel-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 0.04em;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 400;
            text-transform: none;
            letter-spacing: 0;
        }

        /* Funnel */
        .funnel-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .funnel-stage {
            position: relative;
            background: var(--bg-base);
            padding: 14px 16px;
            border-radius: 8px;
            overflow: hidden;
            border-left: 3px solid var(--accent-blue);
            transition: all 0.25s var(--easing);
        }

        .funnel-stage:hover {
            border-left-color: var(--accent-cyan);
            background: rgba(59, 130, 246, 0.04);
        }

        .funnel-bar {
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.12), rgba(6, 182, 212, 0.06));
            transition: width 0.6s var(--easing);
        }

        .funnel-content {
            position: relative;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
        }

        .funnel-qty {
            font-family: 'Fira Code', monospace;
            font-weight: 500;
        }

        .funnel-pct {
            color: var(--text-muted);
            font-weight: 400;
            margin-left: 8px;
            font-size: 11px;
        }

        /* Table */
        .table-section-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            margin-bottom: 14px;
            padding-left: 4px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .table-section-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: linear-gradient(180deg, var(--accent-blue), var(--accent-cyan));
            border-radius: 2px;
        }

        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: var(--bg-base);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }

        td {
            padding: 16px 18px;
            border-bottom: 1px solid rgba(36, 49, 69, 0.5);
            vertical-align: middle;
            font-variant-numeric: tabular-nums;
            transition: background 0.2s ease;
        }

        tr:hover td {
            background-color: rgba(59, 130, 246, 0.03);
        }

        tr:last-child td {
            border-bottom: none;
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-active {
            background: rgba(16, 185, 129, 0.1);
            color: var(--accent-green);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .badge-active::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent-green);
            animation: livePulse 2s ease-in-out infinite;
        }

        .badge-paused {
            background: rgba(100, 116, 139, 0.1);
            color: var(--text-muted);
            border: 1px solid rgba(100, 116, 139, 0.2);
        }

        .roas-high {
            color: var(--accent-green);
            font-weight: 700;
            font-family: 'Fira Code', monospace;
            text-shadow: 0 0 8px var(--accent-green-glow);
        }

        .roas-warn {
            color: var(--accent-yellow);
            font-weight: 600;
            font-family: 'Fira Code', monospace;
        }

        .roas-low {
            color: var(--accent-red);
            font-family: 'Fira Code', monospace;
        }

        .campaign-name {
            font-weight: 600;
            font-size: 12px;
            letter-spacing: -0.01em;
            font-family: 'Fira Code', monospace;
        }

        .campaign-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
            font-family: 'Inter', sans-serif;
        }

        .budget-bar-bg {
            background-color: var(--bg-base);
            width: 80px;
            height: 4px;
            border-radius: 2px;
            margin-top: 6px;
            overflow: hidden;
        }

        .budget-bar-fill {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-cyan));
            transition: width 0.6s var(--easing);
        }

        .data-cell {
            font-family: 'Fira Code', monospace;
            font-size: 13px;
        }

        .ctr-sub {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 2px;
            font-family: 'Inter', sans-serif;
        }

        /* Chart area glow */
        .chart-glow {
            position: relative;
        }

        .chart-glow::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 10%;
            right: 10%;
            height: 40px;
            background: radial-gradient(ellipse, var(--accent-blue-glow), transparent);
            opacity: 0.3;
            filter: blur(20px);
            pointer-events: none;
        }

        /* Reduced motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 16px; }
            .header-container { flex-direction: column; align-items: flex-start; gap: 16px; }
            .kpi-grid { grid-template-columns: repeat(2, 1fr); }
            .kpi-value { font-size: 20px; }
        }

        @media (max-width: 480px) {
            .kpi-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

                chartPoints: [7800, 8200, 8100, 8900, 9400, 9100, 9700, 9410]
            },
            last_90d: {

                    { label: "Total Spend", val: "$182,450.00", delta: "+14.8%", up: true },
                    { label: "Attributed Revenue", val: "$492,615.00", delta: "+11.2%", up: true },
                    { label: "Blended ROAS", val: "2.70x", delta: "-3.1%", up: false },
                    { label: "Average CPA", val: "$31.22", delta: "+4.8%", up: false },
                    { label: "Link Clicks", val: "214,500", delta: "+12.2%", up: true },

                ],
                funnel: [
                    { stage: "Impressions", qty: "10,163,500", pct: 100 },
                    { stage: "Link Clicks", qty: "214,500", pct: 2.11 },
                    { stage: "Initiate Checkout", qty: "26,100", pct: 0.25 },
                    { stage: "Purchases", qty: "15,780", pct: 0.15 }
                ],
                campaigns: [
                    { status: "ACTIVE", name: "PROP_TOV_CORE_USA_PROSPECTING", spend: 112450.00, budget: 120000, imp: 6140000, clicks: 121000, ctr: 1.97, cpa: 29.50, roas: 2.81 },
                    { status: "ACTIVE", name: "REMARKETING_BOFU_CART_ABANDON", spend: 52000.00, budget: 55000, imp: 2323500, clicks: 78500, ctr: 3.37, cpa: 23.11, roas: 3.95 },
                    { status: "PAUSED", name: "TEST_CREATIVE_V2_STATIC_BANNER", spend: 18000.00, budget: 20000, imp: 1700000, clicks: 15000, ctr: 0.88, cpa: 65.21, roas: 1.10 }
                ],
                chartPoints: [22000, 24500, 23100, 26800, 25400, 27100, 29000, 28450]
            }
        };

        function updateDashboardMetrics() {
            const rangeKey = document.getElementById('timeRange').value;
            const currentData = datasetStore[rangeKey];

            // KPI Cards with staggered animation
            const gridContainer = document.getElementById('kpiGridContainer');
            gridContainer.innerHTML = currentData.kpis.map((kpi, i) => `
                <div class="kpi-card" style="animation-delay: ${i * 60}ms">
                    <div class="kpi-label">${kpi.label}</div>
                    <div class="kpi-value">${kpi.val}</div>
                    <div class="kpi-delta ${kpi.up ? 'delta-up' : 'delta-down'}">
                        ${kpi.up ? '&#9650;' : '&#9660;'} ${kpi.delta}
                        <span class="delta-label">vs prev. period</span>
                    </div>
                </div>
            `).join('');

            // Funnel
            const funnelContainer = document.getElementById('funnelContainer');
            funnelContainer.innerHTML = currentData.funnel.map((item, index, arr) => {
                const widthPercent = index === 0 ? 100 : (parseFloat(item.qty.replace(/,/g, '')) / parseFloat(arr[0].qty.replace(/,/g, '')) * 100) * 5;
                const cappedWidth = Math.min(Math.max(widthPercent, 8), 100);
                return `
                    <div class="funnel-stage" style="animation: cardEnter 0.4s var(--easing) ${index * 80}ms forwards; opacity: 0; transform: translateY(8px);">
                        <div class="funnel-bar" style="width: ${cappedWidth}%"></div>
                        <div class="funnel-content">
                            <span>${item.stage}</span>
                            <span>
                                <span class="funnel-qty">${item.qty}</span>
                                <span class="funnel-pct">${item.pct}%</span>
                            </span>
                        </div>
                    </div>
                `;
            }).join('');

            // Campaign Table
            const tableBody = document.getElementById('campaignTableBody');
            tableBody.innerHTML = currentData.campaigns.map(camp => {
                const budgetPct = Math.min((camp.spend / camp.budget) * 100, 100);
                let roasClass = 'roas-high';
                if (camp.roas < 3.0) roasClass = 'roas-warn';
                if (camp.roas < 1.5) roasClass = 'roas-low';

                return `
                    <tr>
                        <td>
                            <span class="badge ${camp.status === 'ACTIVE' ? 'badge-active' : 'badge-paused'}">
                                ${camp.status}
                            </span>
                        </td>
                        <td>
                            <div class="campaign-name">${camp.name}</div>
                            <div class="campaign-sub">Delivery Pipeline Node</div>
                        </td>
                        <td>
                            <div class="data-cell">$${camp.spend.toLocaleString(undefined, {minimumFractionDigits: 2})}</div>
                            <div class="budget-bar-bg" title="Budget: $${camp.budget.toLocaleString()}">
                                <div class="budget-bar-fill" style="width: ${budgetPct}%"></div>
                            </div>
                        </td>
                        <td class="data-cell">${camp.imp.toLocaleString()}</td>
                        <td>
                            <div class="data-cell">${camp.clicks.toLocaleString()}</div>
                            <div class="ctr-sub">${camp.ctr.toFixed(2)}% CTR</div>
                        </td>
                        <td class="data-cell">$${camp.cpa.toFixed(2)}</td>
                        <td><span class="${roasClass}">${camp.roas.toFixed(2)}x</span></td>
                    </tr>
                `;
            }).join('');

            renderChart(currentData.chartPoints);
        }

        function renderChart(points) {
            const canvas = document.getElementById('velocityChart');
            const ctx = canvas.getContext('2d');
            const rect = canvas.getBoundingClientRect();
            const dpr = window.devicePixelRatio || 1;

            canvas.width = rect.width * dpr;
            canvas.height = 220 * dpr;
            ctx.scale(dpr, dpr);

            const width = rect.width;
            const height = 220;
            const padding = { top: 20, bottom: 20, left: 0, right: 0 };
            const chartW = width - padding.left - padding.right;
            const chartH = height - padding.top - padding.bottom;

            ctx.clearRect(0, 0, width, height);

            // Grid lines
            ctx.strokeStyle = 'rgba(59, 130, 246, 0.06)';
            ctx.lineWidth = 1;
            for (let i = 1; i <= 4; i++) {
                const y = padding.top + (chartH / 5) * i;
                ctx.beginPath();
                ctx.moveTo(padding.left, y);
                ctx.lineTo(width - padding.right, y);
                ctx.stroke();
            }

            const maxVal = Math.max(...points) * 1.1;
            const minVal = Math.min(...points) * 0.9;
            const range = maxVal - minVal;
            const stepX = chartW / (points.length - 1);

            function getY(val) {
                return padding.top + chartH - ((val - minVal) / range * chartH);
            }

            function getX(idx) {
                return padding.left + idx * stepX;
            }

            // Area gradient fill
            ctx.beginPath();
            ctx.moveTo(getX(0), getY(points[0]));
            for (let i = 1; i < points.length; i++) {
                const prevX = getX(i - 1);
                const prevY = getY(points[i - 1]);
                const currX = getX(i);
                const currY = getY(points[i]);
                const cpX = (prevX + currX) / 2;
                ctx.bezierCurveTo(cpX, prevY, cpX, currY, currX, currY);
            }
            ctx.lineTo(getX(points.length - 1), height);
            ctx.lineTo(getX(0), height);
            ctx.closePath();

            const areaGrad = ctx.createLinearGradient(0, padding.top, 0, height);
            areaGrad.addColorStop(0, 'rgba(59, 130, 246, 0.15)');
            areaGrad.addColorStop(0.7, 'rgba(59, 130, 246, 0.03)');
            areaGrad.addColorStop(1, 'rgba(59, 130, 246, 0.0)');
            ctx.fillStyle = areaGrad;
            ctx.fill();

            // Line
            ctx.beginPath();
            ctx.moveTo(getX(0), getY(points[0]));
            for (let i = 1; i < points.length; i++) {
                const prevX = getX(i - 1);
                const prevY = getY(points[i - 1]);
                const currX = getX(i);
                const currY = getY(points[i]);
                const cpX = (prevX + currX) / 2;
                ctx.bezierCurveTo(cpX, prevY, cpX, currY, currX, currY);
            }

            const lineGrad = ctx.createLinearGradient(0, 0, width, 0);
            lineGrad.addColorStop(0, '#3b82f6');
            lineGrad.addColorStop(1, '#06b6d4');
            ctx.strokeStyle = lineGrad;
            ctx.lineWidth = 2.5;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.stroke();

            // Data points
            points.forEach((pt, idx) => {
                const x = getX(idx);
                const y = getY(pt);

                // Outer glow
                ctx.beginPath();
                ctx.arc(x, y, 6, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(59, 130, 246, 0.15)';
                ctx.fill();

                // Inner dot
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fillStyle = '#3b82f6';
                ctx.fill();
                ctx.strokeStyle = '#060a14';
                ctx.lineWidth = 1.5;
                ctx.stroke();
            });
        }

        document.addEventListener("DOMContentLoaded", () => {
            updateDashboardMetrics();
            window.addEventListener('resize', () => {
                const rangeKey = document.getElementById('timeRange').value;
                renderChart(datasetStore[rangeKey].chartPoints);
            });
        });
    </script>
